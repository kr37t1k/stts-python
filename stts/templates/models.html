<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Models - SileroTTS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        
        .model-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .model-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
        }
        
        .model-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .model-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .model-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .model-details {
            display: grid;
            gap: 0.5rem;
        }
        
        .model-detail-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
        }
        
        .model-detail-label {
            color: var(--text-secondary);
        }
        
        .model-detail-value {
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
        }
        
        .speakers-list {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }
        
        .speakers-title {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .speakers-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
        }
        
        .speaker-tag {
            background: var(--bg-tertiary);
            padding: 0.25rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary-light);
            text-decoration: none;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            color: var(--primary);
            transform: translateX(-4px);
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        
        @media (max-width: 768px) {
            .models-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="fade-in">
            <div class="logo">
                <div class="logo-icon">🎙️</div>
                <h1>SileroTTS</h1>
            </div>
            <p class="subtitle">Available Models & Speakers</p>
        </header>

        <a href="/" class="back-link">← Back to Origin</a>

        <div id="modelsContainer" class="models-grid">
            <div class="loading">Loading models...</div>
        </div>

        <footer>
            <p>SileroTTS API Server • <a href="/docs" target="_blank">OpenAPI Docs</a></p>
        </footer>
    </div>

    <script>
        async function loadModels() {
            try {
                const response = await fetch('/models');
                const data = await response.json();
                renderModels(data);
            } catch (error) {
                document.getElementById('modelsContainer').innerHTML = 
                    `<div class="loading" style="color: var(--error)">Failed to load models: ${error.message}</div>`;
            }
        }

        function renderModels(data) {
            const container = document.getElementById('modelsContainer');
            const models = data.available_models || {};
            const speakersData = data.available_speakers || data.available_sample_rates;
            console.warn(speakersData);
            if (Object.keys(models).length === 0) {
                container.innerHTML = '<div class="loading">No models available</div>';
                return;
            }

            let html = '';
            
            for (const [lang, modelsList] of Object.entries(models)) {
                const langName = getLanguageName(lang);
                
                for (const modelId of modelsList) {
                    const cacheKey = `${lang}_${modelId}`;
                    const speakers = speakersData[cacheKey]?.speakers || [];
                    const sampleRates = speakersData[cacheKey]?.sample_rates || [];
                    
                    html += `
                        <div class="model-card">
                            <div class="model-header">
                                <div class="model-icon">🎤</div>
                                <div>
                                    <div class="model-name">${modelId}</div>
                                    <small style="color: var(--text-secondary)">${langName}</small>
                                </div>
                            </div>
                            <div class="model-details">
                                <div class="model-detail-item">
                                    <span class="model-detail-label">Language</span>
                                    <span class="model-detail-value">${lang.toUpperCase()}</span>
                                </div>
                                <div class="model-detail-item">
                                    <span class="model-detail-label">Speakers</span>
                                    <span class="model-detail-value">${speakers.length}</span>
                                </div>
                                ${sampleRates.length > 0 ? `
                                <div class="model-detail-item">
                                    <span class="model-detail-label">Sample Rates</span>
                                    <span class="model-detail-value">${sampleRates.join(', ')}</span>
                                </div>
                                ` : ''}
                            </div>
                            ${speakers.length > 0 ? `
                            <div class="speakers-list">
                                <div class="speakers-title">Available Speakers</div>
                                <div class="speakers-tags">
                                    ${speakers.map(s => `<span class="speaker-tag">${s}</span>`).join('')}
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    `;
                }
            }
            
            container.innerHTML = html;
        }

        function getLanguageName(code) {
            const names = {
                'ru': 'Russian (Русский)',
                'en': 'English',
                'de': 'German (Deutsch)',
                'es': 'Spanish (Español)',
                'fr': 'French (Français)',
                'uk': 'Ukrainian (Українська)',
                'uz': 'Uzbek (O\'zbek)',
                'tt': 'Tatar (Татар)',
                'ba': 'Bashkir (Башҡорт)',
                'xal': 'Kalmyk (Хальмг)',
                'indic': 'Indic Languages',
                'cyrillic': 'Cyrillic',
                'multi': 'Multi-language'
            };
            return names[code] || code.toUpperCase();
        }

        loadModels();
    </script>
</body>
</html>
